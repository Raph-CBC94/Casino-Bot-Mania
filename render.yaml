services:
  - type: worker
    name: casino-discord-bot
    runtime: node
    rootDir: bot
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: DB_PATH
        value: /var/data/casino.db
    disk:
      name: casino-data
      mountPath: /var/data
      sizeGB: 1
